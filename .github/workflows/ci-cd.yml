name: CI/CD Production Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_BUILDKIT: 1

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [core_engine, orchestrator]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run lint (ruff)
        working-directory: ${{ matrix.service }}
        run: |
          pip install ruff
          ruff check .
      - name: Run tests (placeholder)
        working-directory: ${{ matrix.service }}
        run: |
          echo "No tests defined yet – add pytest suites to each service."

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker images for each service
        run: |
          services=(core_engine orchestrator agents/template)
          for svc in "${services[@]}"; do
            echo "Building $svc..."
            docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-$svc:latest ./$svc
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-$svc:latest
          done

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to your Vercel or EC2 stack (placeholder)
        run: |
          echo "Add your deployment logic here – e.g., ssh to a host and run docker‑compose up -d, or trigger a Vercel git‑hook."
