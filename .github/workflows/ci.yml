name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # package.json is intentionally gitignored (Node deps are local-only), so
      # Node linting only runs if one is ever committed — otherwise skip cleanly
      # instead of failing every run (and blocking the deploy job downstream).
      - name: Detect Node project
        id: node
        run: echo "present=$([ -f package.json ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: No Node project — skipping lint
        if: steps.node.outputs.present == 'false'
        run: echo "No package.json committed (gitignored by design) — nothing to lint."

      - uses: actions/setup-node@v4
        if: steps.node.outputs.present == 'true'
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.node.outputs.present == 'true'
        run: npm install

      - name: Type check
        if: steps.node.outputs.present == 'true'
        run: npx tsc --noEmit

      - name: Lint
        if: steps.node.outputs.present == 'true'
        run: npm run lint

  trading-bot:
    name: Trading Bot (Python)
    runs-on: ubuntu-latest
    env:
      APCA_API_KEY_ID:     ${{ secrets.APCA_API_KEY_ID }}
      APCA_API_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      APCA_API_BASE_URL:   ${{ secrets.APCA_API_BASE_URL }}
      ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
      OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
      NVIDIA_API_KEY:      ${{ secrets.NVIDIA_API_KEY }}
      NVIDIA_MODEL:        ${{ secrets.NVIDIA_MODEL }}
      GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
      XAI_API_KEY:         ${{ secrets.XAI_API_KEY }}
      AI_BRAIN_ENABLED:    ${{ secrets.AI_BRAIN_ENABLED }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -q -r requirements.txt

      - name: Syntax gate
        run: python -m py_compile $(git ls-files '*.py')

      - name: Offline test suite (zero real orders)
        # Hermetic: blank the job-level secrets for this step so the suite runs
        # credential-less (the tests assert offline-sim = zero real orders).
        env:
          ALPACA_API_KEY: ""
          ALPACA_SECRET_KEY: ""
          APCA_API_KEY_ID: ""
          APCA_API_SECRET_KEY: ""
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
          NVIDIA_API_KEY: ""
          GEMINI_API_KEY: ""
          XAI_API_KEY: ""
          AI_BRAIN_ENABLED: "false"
        run: |
          python -m tests.test_dry_run
          python -m tests.test_broker_factory
          python -m tests.test_broker_conformance
          python -m tests.test_robinhood_adapter
          python -m tests.test_remote_control
          python -m tests.test_controls

      - name: Verify Alpaca credentials are wired
        run: |
          python - <<'EOF'
          import os, sys
          key    = os.getenv("APCA_API_KEY_ID") or os.getenv("ALPACA_API_KEY")
          secret = os.getenv("APCA_API_SECRET_KEY") or os.getenv("ALPACA_SECRET_KEY")
          base   = os.getenv("APCA_API_BASE_URL", "https://broker-api.sandbox.alpaca.markets")
          if not key or not secret:
              print("ERROR: Alpaca credentials not found in environment")
              sys.exit(1)
          mode = "SANDBOX" if "sandbox" in base else "PRODUCTION"
          print(f"Alpaca credentials present — mode: {mode}")
          EOF

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Trigger Vercel deployment
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" \
            -o /dev/null -w "Vercel hook status: %{http_code}\n"
