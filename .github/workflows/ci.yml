name: CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # These steps only apply if the repo grows an npm project (package.json).
      # Without one, `npm install` / `npm run lint` fail every push — guard them.
      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm install; else echo "no package.json — skipping"; fi

      - name: Type check
        run: |
          if [ -f tsconfig.json ]; then npx tsc --noEmit; else echo "no tsconfig.json — skipping"; fi

      - name: Lint
        run: |
          if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts?.lint?0:1)"; then
            npm run lint
          else
            echo "no lint script — skipping"
          fi

  tests:
    name: Test Suites (Python + Dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax gate
        run: python -m py_compile $(git ls-files '*.py')

      - name: Python test suites
        run: |
          python -m tests.test_dry_run
          python -m tests.test_hermes
          python -m tests.test_advisors
          python -m tests.test_credit_spreads
          python -m tests.test_day_trading
          python -m tests.test_vol_target
          python -m tests.test_alt_data
          python -m tests.test_model_registry
          python -m tests.test_copy_trading
          python -m tests.test_circuit_breaker

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Dashboard UI test (jsdom)
        run: |
          npm install --no-save jsdom@24
          node tests/ui_test.js

  trading-bot:
    name: Trading Bot (Python)
    runs-on: ubuntu-latest
    env:
      APCA_API_KEY_ID:     ${{ secrets.APCA_API_KEY_ID }}
      APCA_API_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      APCA_API_BASE_URL:   ${{ secrets.APCA_API_BASE_URL }}
      ALPACA_API_KEY:      ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY:   ${{ secrets.ALPACA_SECRET_KEY }}
      OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
      NVIDIA_API_KEY:      ${{ secrets.NVIDIA_API_KEY }}
      NVIDIA_MODEL:        ${{ secrets.NVIDIA_MODEL }}
      GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
      XAI_API_KEY:         ${{ secrets.XAI_API_KEY }}
      AI_BRAIN_ENABLED:    ${{ secrets.AI_BRAIN_ENABLED }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify Alpaca credentials are wired
        run: |
          python - <<'EOF'
          import os, sys
          key    = os.getenv("APCA_API_KEY_ID") or os.getenv("ALPACA_API_KEY")
          secret = os.getenv("APCA_API_SECRET_KEY") or os.getenv("ALPACA_SECRET_KEY")
          base   = os.getenv("APCA_API_BASE_URL", "https://broker-api.sandbox.alpaca.markets")
          if not key or not secret:
              print("ERROR: Alpaca credentials not found in environment")
              sys.exit(1)
          mode = "SANDBOX" if "sandbox" in base else "PRODUCTION"
          print(f"Alpaca credentials present — mode: {mode}")
          EOF

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Trigger Vercel deployment
        run: |
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" \
            -o /dev/null -w "Vercel hook status: %{http_code}\n"
