name: SAHJONY desk (scheduled)

on:
  schedule:
    # 24/7 desk: every 15 min, all hours, every day. Crypto trades round-the-clock;
    # equities simply queue while their market is closed.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if the market is closed'
        type: boolean
        default: true
      deploy_hook:
        description: 'Optional Vercel Deploy Hook URL to publish this run'
        type: string
        default: ''

concurrency:
  group: sahjony-desk
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_PAPER: 'true'
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      NVIDIA_MODEL: ${{ vars.NVIDIA_MODEL }}
      AI_BRAIN_ENABLED: ${{ vars.AI_BRAIN_ENABLED || secrets.AI_BRAIN_ENABLED || ((secrets.ANTHROPIC_API_KEY != '' || secrets.NVIDIA_API_KEY != '') && 'true' || 'false') }}
      AUTO_UPDATE_MODELS: 'true'
      TICKERS: ${{ vars.TICKERS || 'AAPL,MSFT,NVDA,GOOGL,AMZN,TSLA,META,SPY,QQQ,DIA,BTC/USD,ETH/USD,SOL/USD,LTC/USD' }}
      MARKET_HOURS: ${{ vars.MARKET_HOURS || '24_7' }}
      CYCLE_MINUTES: ${{ vars.CYCLE_MINUTES || '15' }}
      MAX_ALLOCATION_PCT: ${{ vars.MAX_ALLOCATION_PCT || '0.12' }}
      MAX_TOTAL_DEPLOYED_PCT: ${{ vars.MAX_TOTAL_DEPLOYED_PCT || '0.70' }}
      MIN_COUNCIL_CONVICTION: ${{ vars.MIN_COUNCIL_CONVICTION || '0.52' }}
      MAX_DAILY_DRAWDOWN_PCT: ${{ vars.MAX_DAILY_DRAWDOWN_PCT || '0.10' }}
      DAY_TRADING_ENABLED: ${{ vars.DAY_TRADING_ENABLED || 'true' }}
      LADDER_ENABLE_AVERAGING: ${{ vars.LADDER_ENABLE_AVERAGING || 'true' }}
      COPY_TRADING_ENABLED: ${{ vars.COPY_TRADING_ENABLED || 'false' }}
      COPY_TRADING_SOURCE_URL: ${{ vars.COPY_TRADING_SOURCE_URL || '' }}
      VOICE_ALERTS: ${{ vars.VOICE_ALERTS || 'false' }}
      VOICE_API_KEY: ${{ secrets.VOICE_API_KEY }}
      OWNER_PHONE: ${{ secrets.OWNER_PHONE }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore desk state
        uses: actions/cache@v4
        with:
          path: |
            state.json
            model_cache.json
            data
          key: sahjony-state-${{ github.run_id }}
          restore-keys: |
            sahjony-state-

      - name: Run one trading cycle
        run: python main.py --once --force

      - name: Preflight (read-only) summary
        if: always()
        run: python main.py --preflight || true

      - name: Commit refreshed dashboard snapshot
        run: |
          git config user.name  "sahjony-desk[bot]"
          git config user.email "noreply@anthropic.com"
          if ! git diff --quiet -- public/status.json; then
            git add public/status.json
            git commit -m "Desk snapshot: cycle ${{ github.run_number }} update"
            for i in 1 2 3 4; do git push && break || sleep $((2**i)); done
          else
            echo "No change in public/status.json — nothing to commit."
          fi

      - name: Trigger Vercel production deploy (if hook configured)
        env:
          HOOK: ${{ github.event.inputs.deploy_hook || secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsS -X POST "$HOOK" >/dev/null && echo "Vercel deploy hook fired ✓" || echo "deploy hook call failed"
          else
            echo "VERCEL_DEPLOY_HOOK not set — skipping."
          fi
