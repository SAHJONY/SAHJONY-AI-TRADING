name: SAHJONY desk (scheduled)

on:
  schedule:
    # 24/7 desk: every 15 min, all hours, every day. Crypto trades round-the-clock;
    # equities simply queue while their market is closed.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Run even if the market is closed'
        type: boolean
        default: true
      deploy_hook:
        description: 'Optional Vercel Deploy Hook URL to publish this run'
        type: string
        default: ''

concurrency:
  group: sahjony-desk
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      # ── Broker selection ──────────────────────────────────────────────────────
      # Default 'alpaca' (paper) keeps the desk 100% paper. Set repo Variable
      # BROKER=robinhood_crypto to route the LIVE 24/7 crypto engine instead.
      BROKER: ${{ vars.BROKER || 'alpaca' }}
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_PAPER: 'true'
      # ── Robinhood Crypto (REAL MONEY, official Ed25519 API) ───────────────────
      # HARD-GATED: real orders place ONLY when the adapter is armed — i.e. ALL of
      #   BROKER=robinhood_crypto  +  ROBINHOOD_API_KEY  +  ROBINHOOD_PRIVATE_KEY
      #   +  ROBINHOOD_LIVE=true  +  LIVE_TRADING_ACK=I_UNDERSTAND_REAL_MONEY.
      # Missing any → dry-run (prices live, places nothing). Per-order notional is
      # capped by ROBINHOOD_MAX_ORDER_USD and the risk engine still gates size.
      ROBINHOOD_API_KEY: ${{ secrets.ROBINHOOD_API_KEY }}
      ROBINHOOD_PRIVATE_KEY: ${{ secrets.ROBINHOOD_PRIVATE_KEY }}
      ROBINHOOD_LIVE: ${{ vars.ROBINHOOD_LIVE || 'false' }}
      ROBINHOOD_MAX_ORDER_USD: ${{ vars.ROBINHOOD_MAX_ORDER_USD || '10' }}
      LIVE_TRADING_ACK: ${{ secrets.LIVE_TRADING_ACK }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      NVIDIA_MODEL: ${{ vars.NVIDIA_MODEL }}
      AI_BRAIN_ENABLED: ${{ vars.AI_BRAIN_ENABLED || secrets.AI_BRAIN_ENABLED || ((secrets.ANTHROPIC_API_KEY != '' || secrets.NVIDIA_API_KEY != '') && 'true' || 'false') }}
      AUTO_UPDATE_MODELS: 'true'
      # Universe spans asset classes: mega-cap equities, index ETFs, commodities
      # (GLD/SLV), bonds (TLT), international (EEM) and 24/7 crypto. When BROKER=
      # robinhood_crypto, set Variable TICKERS to crypto-only, e.g.
      # 'BTC/USD,ETH/USD,SOL/USD,LTC/USD' (stock symbols can't price on a crypto venue).
      TICKERS: ${{ vars.TICKERS || 'AAPL,MSFT,NVDA,GOOGL,AMZN,TSLA,META,SPY,QQQ,DIA,GLD,SLV,TLT,EEM,BTC/USD,ETH/USD,SOL/USD,LTC/USD' }}
      MARKET_HOURS: ${{ vars.MARKET_HOURS || '24_7' }}
      CYCLE_MINUTES: ${{ vars.CYCLE_MINUTES || '15' }}
      MAX_ALLOCATION_PCT: ${{ vars.MAX_ALLOCATION_PCT || '0.12' }}
      MAX_TOTAL_DEPLOYED_PCT: ${{ vars.MAX_TOTAL_DEPLOYED_PCT || '0.70' }}
      MIN_COUNCIL_CONVICTION: ${{ vars.MIN_COUNCIL_CONVICTION || '0.52' }}
      MAX_DAILY_DRAWDOWN_PCT: ${{ vars.MAX_DAILY_DRAWDOWN_PCT || '0.10' }}
      DAY_TRADING_ENABLED: ${{ vars.DAY_TRADING_ENABLED || 'true' }}
      LADDER_ENABLE_AVERAGING: ${{ vars.LADDER_ENABLE_AVERAGING || 'true' }}
      COPY_TRADING_ENABLED: ${{ vars.COPY_TRADING_ENABLED || 'false' }}
      COPY_TRADING_SOURCE_URL: ${{ vars.COPY_TRADING_SOURCE_URL || '' }}
      VOICE_ALERTS: ${{ vars.VOICE_ALERTS || 'false' }}
      VOICE_API_KEY: ${{ secrets.VOICE_API_KEY }}
      OWNER_PHONE: ${{ secrets.OWNER_PHONE }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
      WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
      WHATSAPP_TO: ${{ vars.WHATSAPP_TO || secrets.OWNER_PHONE }}
      WHATSAPP_TEMPLATE: ${{ vars.WHATSAPP_TEMPLATE }}
      SEC_USER_AGENT: 'SAHJONY Capital research contact@sahjonycapital.com'
      BENCHMARK: ${{ vars.BENCHMARK || 'SPY' }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-fable-5' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o' }}
      XAI_MODEL: ${{ vars.XAI_MODEL || 'grok-2-latest' }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-pro' }}
      TRADING_HALT: ${{ vars.TRADING_HALT || 'false' }}
      VOL_TARGET_ANNUAL: ${{ vars.VOL_TARGET_ANNUAL || '0.20' }}
      TRADING_CAPITAL: ${{ vars.TRADING_CAPITAL || '0' }}
      FOREX_PAIRS: ${{ vars.FOREX_PAIRS || 'EUR/USD,GBP/USD,USD/JPY,AUD/USD' }}
      DAY_TRADE_SYMBOLS: ${{ vars.DAY_TRADE_SYMBOLS || '' }}
      DAY_TRADE_TARGET_PCT: ${{ vars.DAY_TRADE_TARGET_PCT || '0.015' }}
      DAY_TRADE_STOP_PCT: ${{ vars.DAY_TRADE_STOP_PCT || '0.01' }}
      # Alt-data overlay (QuiverQuant insider + congressional trading). Add repo
      # secret QUIVER_API_KEY to activate; auto-on when present. The desk runs HERE
      # (GitHub Actions), not on Vercel — a Vercel env var can't reach it.
      QUIVER_API_KEY: ${{ secrets.QUIVER_API_KEY }}
      # Hermes guardian — background agent (data integrity, Sharpe scorecard,
      # bounded self-calibration). On by default; set Variable HERMES_ENABLED=false to disable.
      HERMES_ENABLED: ${{ vars.HERMES_ENABLED || 'true' }}
      HERMES_GOAL: ${{ vars.HERMES_GOAL || '' }}
      # Credit Spread Desk — defined-risk bull put spreads (max loss known at entry).
      CREDIT_SPREADS_ENABLED: ${{ vars.CREDIT_SPREADS_ENABLED || 'true' }}
      # Advisory Board — 6-agent council (Buffett/Munger/Macro/Growth/Quant + gate).
      ADVISORS_ENABLED: ${{ vars.ADVISORS_ENABLED || 'true' }}
      # Pairs / StatArb desk — market-neutral cointegrated spreads (long/short).
      PAIRS_ENABLED: ${{ vars.PAIRS_ENABLED || 'true' }}
      PAIRS: ${{ vars.PAIRS || 'SPY:QQQ,GLD:SLV' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore desk state
        uses: actions/cache@v4
        with:
          path: |
            state.json
            model_cache.json
            data
          key: sahjony-state-${{ github.run_id }}
          restore-keys: |
            sahjony-state-

      - name: Refresh copy-trading signals (SEC Form 4 insider buys)
        run: python -m scripts.build_copy_signals || true

      - name: Run one trading cycle
        run: python main.py --once --force

      - name: Preflight (read-only) summary
        if: always()
        run: python main.py --preflight || true

      - name: Commit refreshed dashboard snapshot
        run: |
          git config user.name  "sahjony-desk[bot]"
          git config user.email "noreply@anthropic.com"
          if ! git diff --quiet -- public/status.json; then
            git add public/status.json public/copy_signals.json
            git commit -m "Desk snapshot: cycle ${{ github.run_number }} update"
            for i in 1 2 3 4; do git push && break || sleep $((2**i)); done
          else
            echo "No change in public/status.json — nothing to commit."
          fi

      - name: Trigger Vercel production deploy (if hook configured)
        env:
          HOOK: ${{ github.event.inputs.deploy_hook || secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -n "$HOOK" ]; then
            curl -fsS -X POST "$HOOK" >/dev/null && echo "Vercel deploy hook fired ✓" || echo "deploy hook call failed"
          else
            echo "VERCEL_DEPLOY_HOOK not set — skipping."
          fi
