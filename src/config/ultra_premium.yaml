meta:
  business_name: "SAHJONY TRADING FIRM"
  design_philosophy: "Ultra-Premium Cinematic Realism"
  visual_fidelity_target: "8K UHD Texture Quality"
  color_space: "Display-P3"

visual_engine:
  canvas_environment:
    background_base: "#0A0A0A"
    lighting_model: "RayTraced"
    vignette_intensity: 0.30
    film_grain_opacity: 0.01

  photorealistic_assets:
    core_visual_type: "Interactive 3D Glassmorphic Mechanism"
    refraction_index: 1.52
    surface_materials:
      - material: "Anodized Dark Titanium"
        roughness: 0.25
        metalness: 0.90
      - material: "Frosted Smoked Quartz"
        transmission: 0.60
        ior: 1.54
    chromatic_aberration: 0.08
    dynamic_blur_radius: "40px"

  lighting_setup:
    key_light:
      color: "#FFFFFF"
      intensity: 2.2
      coordinates: [10, 20, 15]
    rim_accent_light:
      color: "#F50057"
      intensity: 4.0
      coordinates: [-20, -10, -15]

  animation_cinematics:
    easing_curve: "cubic-bezier(0.16, 1, 0.3, 1)"
    entrance_sequence:
      camera_truck_in_ms: 2800
      asset_render_stagger_ms: 120
    cursor_interaction:
      magnetic_attraction_force: 0.20
      inertia_damping_factor: 0.92

copywriting:
  typography:
    display_font: "Inter Tight"
    weight: 600
    letter_spacing: "-0.03em"
  hero_messaging:
    headline: "The Ultimate AI Trading Infrastructure for Modern Markets."
    subheadline: "Deploy fully autonomous AI agents that execute trades, analyze markets, and optimize portfolio performance with zero overhead."
  conversion_funnel:
    input_field:
      placeholder_text: "Enter corporate email address"
      focus_glow_color: "rgba(0, 229, 163, 0.15)"
    action_button:
      label_text: "Request Secure Access"
      hover_state: "Anodized Metallic Pulse"

integration_pipelines:
  database_destination: "enterprise_waitlist_leads"
  verification_required: true
  encryption_standard: "AES-256"
