apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-trading-bot.fullname" . }}
  labels:
    {{- include "ai-trading-bot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-trading-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-trading-bot.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "ai-trading-bot.fullname" . }}-secret
          ports:
            - containerPort: {{ .Values.service.port }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["python", "main.py", "--dry-run"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["python", "main.py", "--dry-run"]
            initialDelaySeconds: 10
            periodSeconds: 15
