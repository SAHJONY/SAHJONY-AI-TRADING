replicaCount: 1

image:
  repository: sahjony/ai-trading
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
  requests:
    cpu: "250m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 60

nodeSelector: {}
tolerations: []
affinity: {}

secrets:
  alpacaApiKey: "YOUR_ALPACA_API_KEY"
  alpacaApiSecret: "YOUR_ALPACA_API_SECRET"
