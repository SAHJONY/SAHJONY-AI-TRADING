<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SAHJONY Broker Diagnostics</title>
<style>
:root{--bg:#070a10;--p:#101722;--l:#243149;--t:#eef4ff;--m:#8d9bb5;--g:#37d69a;--r:#f0647c;--a:#e7b64a;--c:#43bdd6;--mono:ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}body{margin:0;background:radial-gradient(900px 500px at 80% -10%,#14243a,transparent),var(--bg);color:var(--t);font-family:Inter,system-ui,sans-serif}header{padding:18px 22px;border-bottom:1px solid var(--l);display:flex;align-items:center;gap:12px}.logo{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;background:linear-gradient(145deg,#f4d288,var(--a));color:#211707;font-weight:900}.sub{font:10px var(--mono);color:var(--a);letter-spacing:1.7px}.sp{flex:1}.pill{font:11px var(--mono);border:1px solid var(--l);border-radius:999px;padding:6px 10px}a{color:var(--c)}main{max-width:1450px;margin:auto;padding:18px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{grid-column:span 3;background:linear-gradient(180deg,#121a27,#0a0f18);border:1px solid var(--l);border-radius:14px;padding:15px}.wide{grid-column:span 6}.full{grid-column:span 12}.lab{font:10px var(--mono);color:var(--m);text-transform:uppercase;letter-spacing:1.3px}.val{font:700 25px var(--mono);margin-top:8px}.good{color:var(--g)}.bad{color:var(--r)}.warn{color:var(--a)}.mut{color:var(--m)}table{width:100%;border-collapse:collapse;font:12px var(--mono)}th,td{text-align:left;padding:10px;border-bottom:1px solid var(--l)}th{color:var(--m);font-weight:500}pre{white-space:pre-wrap;overflow-wrap:anywhere;background:#070b12;border:1px solid var(--l);padding:12px;border-radius:10px;color:#cdd8ec;max-height:420px;overflow:auto}@media(max-width:900px){.card,.wide{grid-column:span 12}}
</style></head><body>
<header><div class="logo">S</div><div><b>SAHJONY CAPITAL</b><div class="sub">READ-ONLY BROKER DIAGNOSTICS</div></div><div class="sp"></div><a href="/operations">Operations</a><div class="pill" id="fresh">loading</div></header>
<main><div class="grid">
<section class="card"><div class="lab">Gateway</div><div class="val" id="gateway">—</div></section>
<section class="card"><div class="lab">Identity</div><div class="val" id="identity">—</div></section>
<section class="card"><div class="lab">Positions</div><div class="val" id="positions">—</div></section>
<section class="card"><div class="lab">Trading authority</div><div class="val good">DISABLED</div><div class="mut">Read-only diagnostics only</div></section>
<section class="card wide"><div class="lab">Account</div><table><tbody id="accountRows"></tbody></table></section>
<section class="card wide"><div class="lab">Reconciliation</div><div class="val" id="recon">—</div><div id="blockers" class="mut"></div></section>
<section class="card full"><div class="lab">Quote coverage</div><table><thead><tr><th>Symbol</th><th>HTTP</th><th>Price</th><th>As of</th><th>Status</th></tr></thead><tbody id="quoteRows"></tbody></table></section>
<section class="card full"><div class="lab">Redacted raw snapshot</div><pre id="raw">loading</pre></section>
</div></main>
<script>
const $=id=>document.getElementById(id), money=v=>Number.isFinite(Number(v))?'$'+Number(v).toFixed(2):'—';
function state(el,ok,yes,no){el.textContent=ok?yes:no;el.className='val '+(ok?'good':'bad')}
async function load(){try{const r=await fetch('./broker_diagnostics.json?t='+Date.now(),{cache:'no-store'});const d=await r.json();state($('gateway'),d.gateway?.reachable,'ONLINE','OFFLINE');state($('identity'),d.identity?.verified,'VERIFIED','UNVERIFIED');const pos=d.positions?.data?.positions||[];state($('positions'),pos.length>0,pos.length+' VISIBLE','NONE VISIBLE');const acct=d.account?.data||{};$('accountRows').innerHTML=[['Account',acct.account_number_last4?'••••'+acct.account_number_last4:(d.identity?.actual_last4?'••••'+d.identity.actual_last4:'—')],['Type',acct.account_type||'—'],['Status',acct.status||'—'],['Equity',money(acct.equity)],['Cash',money(acct.cash)],['Buying power',money(acct.buying_power)]].map(x=>`<tr><th>${x[0]}</th><td>${x[1]}</td></tr>`).join('');const rec=d.reconciliation||{};$('recon').textContent=String(rec.status||'unknown').toUpperCase();$('recon').className='val '+(rec.status==='observed'?'good':'bad');$('blockers').textContent=(rec.blockers||[]).join(' · ')||'No diagnostic blockers';$('quoteRows').innerHTML='';Object.entries(d.quotes||{}).forEach(([sym,x])=>{const p=x.data||{},ok=x.http_status===200;const tr=document.createElement('tr');tr.innerHTML=`<td><b>${sym}</b></td><td>${x.http_status||0}</td><td>${money(p.price)}</td><td>${p.as_of||'—'}</td><td class="${ok?'good':'bad'}">${ok?'VALID':'FAILED'}</td>`;$('quoteRows').appendChild(tr)});$('raw').textContent=JSON.stringify(d,null,2);$('fresh').textContent='updated '+new Date(d.ts).toLocaleTimeString()}catch(e){$('fresh').textContent='data unavailable';$('fresh').className='pill bad';$('raw').textContent=String(e)}}load();setInterval(load,30000)
</script></body></html>
