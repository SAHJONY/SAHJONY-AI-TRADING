<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sign in — SAHJONY CAPITAL</title>
<style>
  :root{
    --bg:#0a0e17; --panel:#111726; --panel2:#0e1420; --line:#1e2940;
    --txt:#e6edf7; --mut:#8294b4; --acc:#22d3ee; --acc2:#34d399; --bad:#f87171;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;
    background:radial-gradient(1000px 500px at 70% -10%,#13203a 0%,var(--bg) 55%);
    color:var(--txt);font-family:var(--sans)}
  .card{width:100%;max-width:380px;background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:18px;padding:30px 26px;text-align:center}
  .logo{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;margin:0 auto 14px;
    font-weight:800;font-size:24px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#04121a}
  h1{font-size:18px;margin:0;letter-spacing:.5px}
  .sub{color:var(--mut);font-size:12px;text-transform:uppercase;letter-spacing:.6px;margin:4px 0 20px}
  input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:10px;padding:12px 13px;font-size:14px;margin-bottom:10px;font-family:var(--sans)}
  input:focus{outline:none;border-color:var(--acc)}
  button.act{width:100%;background:var(--acc);color:#04121a;border:0;border-radius:10px;
    padding:12px;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px}
  button.act:disabled{opacity:.6;cursor:default}
  button.link{background:none;border:0;color:var(--mut);font-size:12.5px;cursor:pointer;margin-top:14px}
  button.link:hover{color:var(--acc)}
  .msg{min-height:18px;font-size:12.5px;margin-bottom:10px}
  .msg.bad{color:var(--bad)} .msg.ok{color:var(--acc2)}
  .note{color:var(--mut);font-size:11.5px;margin-top:18px;line-height:1.5}
  a{color:var(--acc);text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">S</div>
    <h1>SAHJONY CAPITAL</h1>
    <div class="sub">Owner sign-in</div>
    <div id="msg" class="msg"></div>
    <input id="email" type="email" placeholder="Email" autocomplete="username" />
    <input id="pw" type="password" placeholder="Password" autocomplete="current-password" />
    <button id="go" class="act">Sign in</button>
    <button id="forgot" class="link">Forgot password?</button>
    <div class="note" id="note">Private dashboard — owner access only. <a href="./">View public snapshot →</a></div>
  </div>

<script src="./config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CFG = window.SAHJONY_CONFIG || {};
const OWNER = (CFG.OWNER_EMAIL || "").trim().toLowerCase();
const READY = !!(CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY && window.supabase);
const SB = READY ? window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY) : null;

const el = (id) => document.getElementById(id);
function msg(t, bad){ const m=el('msg'); m.textContent=t||""; m.className = "msg" + (t ? (bad?" bad":" ok") : ""); }
function toDashboard(){ window.location.href = "./"; }

async function ensureOwner(session){
  if (OWNER && session.user.email.toLowerCase() !== OWNER){
    await SB.auth.signOut();
    msg("This dashboard is private to the owner.", true);
    return false;
  }
  return true;
}

async function signIn(){
  if (!READY){ msg("Supabase not configured (set SUPABASE_URL + anon key in config.js).", true); return; }
  const email = el('email').value.trim();
  const password = el('pw').value;
  if (!email || !password){ msg("Enter your email and password.", true); return; }
  if (OWNER && email.toLowerCase() !== OWNER){ msg("This dashboard is private to the owner.", true); return; }
  el('go').disabled = true; msg("Signing in…");
  const { data, error } = await SB.auth.signInWithPassword({ email, password });
  el('go').disabled = false;
  if (error){ msg(error.message, true); return; }
  if (data && data.session && !(await ensureOwner(data.session))) return;
  msg("Signed in — redirecting…");
  toDashboard();
}

async function forgot(){
  if (!READY){ msg("Supabase not configured.", true); return; }
  const email = el('email').value.trim();
  if (!email){ msg("Enter your email first.", true); return; }
  const { error } = await SB.auth.resetPasswordForEmail(email);
  msg(error ? error.message : "Password reset email sent.", !!error);
}

async function init(){
  if (!READY){ msg("Supabase not configured yet — see config.js.", true); return; }
  const { data:{ session } } = await SB.auth.getSession();   // already signed in?
  if (session && await ensureOwner(session)) toDashboard();
}

el('go').onclick = signIn;
el('forgot').onclick = forgot;
el('pw').addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
el('email').addEventListener('keydown', e => { if (e.key === 'Enter') el('pw').focus(); });
init();
</script>
</body>
</html>
