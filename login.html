<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#05070b" />
<title>SAHJONY CAPITAL — Access</title>
<style>
  :root{--bg:#05070b;--panel:#0b0f17;--panel2:#0a0e15;--line:#1f2940;--txt:#e8eefb;
    --mut:#7e8da8;--amber:#ffb000;--amber2:#ffcd5c;--up:#37e0a6;--bad:#ff5c6c;
    --mono:"JetBrains Mono",ui-monospace,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;color:var(--txt);
    font-family:var(--sans);background:radial-gradient(900px 460px at 70% -12%,#0e1626 0%,var(--bg) 60%)}
  .card{width:100%;max-width:360px;background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:18px;padding:32px 26px;text-align:center}
  .logo{width:56px;height:56px;border-radius:15px;display:grid;place-items:center;margin:0 auto 16px;
    font-weight:800;font-size:26px;background:linear-gradient(135deg,var(--amber),#ff8a00);color:#1a1200;
    box-shadow:0 0 24px rgba(255,176,0,.3)}
  h1{font-size:17px;margin:0;letter-spacing:1px;font-weight:800}
  .sub{color:var(--amber);font-size:10px;text-transform:uppercase;letter-spacing:2.6px;margin:5px 0 22px;font-weight:600}
  input{width:100%;background:#05080d;border:1px solid var(--line);color:var(--txt);border-radius:11px;
    padding:13px;font-size:15px;margin-bottom:11px;font-family:var(--mono)}
  input#code{text-align:center;letter-spacing:6px;font-size:20px}
  input:focus{outline:none;border-color:var(--amber)}
  button.act{width:100%;background:var(--amber);color:#1a1200;border:0;border-radius:11px;padding:13px;
    font-weight:800;font-size:14px;letter-spacing:1px;cursor:pointer;font-family:var(--mono)}
  button.act:disabled{opacity:.6;cursor:default}
  button.link{background:none;border:0;color:var(--mut);font-size:12px;cursor:pointer;margin-top:15px}
  button.link:hover{color:var(--amber)}
  .msg{min-height:18px;font-size:12.5px;margin-bottom:10px}
  .msg.bad{color:var(--bad)} .msg.ok{color:var(--up)}
  .who{color:var(--mut);font-size:11.5px;margin-bottom:14px;font-family:var(--mono)}
  .note{color:var(--mut);font-size:11px;margin-top:18px;line-height:1.5}
  a{color:var(--amber);text-decoration:none}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">S</div>
    <h1>SAHJONY CAPITAL</h1>
    <div class="sub">Owner Access</div>
    <div class="who" id="who"></div>
    <div class="msg" id="msg"></div>
    <input id="email" type="email" placeholder="Email" autocomplete="username" style="display:none" />
    <input id="code" type="password" inputmode="text" placeholder="Access code" autocomplete="current-password" />
    <button id="go" class="act">ENTER</button>
    <button id="forgot" class="link">Forgot code?</button>
    <div class="note">Private terminal — owner only. <a href="./">View public snapshot →</a></div>
  </div>

<script src="./config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const CFG = window.SAHJONY_CONFIG || {};
const OWNER = (CFG.OWNER_EMAIL || "").trim();
const READY = !!(CFG.SUPABASE_URL && CFG.SUPABASE_ANON_KEY && window.supabase);
const SB = READY ? window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY) : null;
const el = (id) => document.getElementById(id);
const msg = (t, bad) => { const m = el('msg'); m.textContent = t || ""; m.className = "msg" + (t ? (bad ? " bad" : " ok") : ""); };
const toDashboard = () => { window.location.href = "./"; };

// Passcode mode when an owner email is configured: only ask for the code.
// Otherwise reveal the email field (code field acts as the password).
if (OWNER) { el('who').textContent = OWNER; }
else { el('email').style.display = "block"; el('code').placeholder = "Password"; el('code').style.letterSpacing = "normal"; el('code').style.textAlign = "left"; el('code').style.fontSize = "15px"; }
const emailVal = () => OWNER || el('email').value.trim();

async function signIn(){
  if (!READY){ msg("Supabase not configured (config.js).", true); return; }
  const email = emailVal(), password = el('code').value;
  if (!email || !password){ msg(OWNER ? "Enter your access code." : "Enter email and password.", true); return; }
  el('go').disabled = true; msg("Verifying…");
  const { data, error } = await SB.auth.signInWithPassword({ email, password });
  el('go').disabled = false;
  if (error){ msg(error.message, true); return; }
  if (OWNER && data && data.session && data.session.user.email.toLowerCase() !== OWNER.toLowerCase()){
    await SB.auth.signOut(); msg("This terminal is private to the owner.", true); return;
  }
  msg("Welcome — opening terminal…"); toDashboard();
}
async function forgot(){
  if (!READY){ msg("Supabase not configured.", true); return; }
  const email = emailVal(); if (!email){ msg("Enter your email first.", true); return; }
  const { error } = await SB.auth.resetPasswordForEmail(email);
  msg(error ? error.message : "Reset email sent — set a new code from the link.", !!error);
}
async function init(){
  if (!READY){ msg("Supabase not configured yet — see config.js.", true); return; }
  const { data:{ session } } = await SB.auth.getSession();
  if (session && (!OWNER || session.user.email.toLowerCase() === OWNER.toLowerCase())) toDashboard();
}
el('go').onclick = signIn;
el('forgot').onclick = forgot;
el('code').addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
el('email').addEventListener('keydown', e => { if (e.key === 'Enter') el('code').focus(); });
init();
</script>
</body>
</html>
